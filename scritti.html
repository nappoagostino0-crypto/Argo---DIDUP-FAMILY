<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argo DidUp - Voti Scritti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h5><i class="fas fa-book-open"></i> DidUp</h5>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="classe.html"><i class="fas fa-users"></i> Gestione Classe</a></li>
                <li><a href="registro.html"><i class="fas fa-book"></i> Appello</a></li>
                <li><a href="orali.html"><i class="fas fa-microphone"></i> Voti Orali</a></li>
                <li><a href="scritti.html" class="active"><i class="fas fa-pen"></i> Voti Scritti</a></li>
                <li><a href="note.html"><i class="fas fa-sticky-note"></i> Note</a></li>
                <li><a href="scrutini.html"><i class="fas fa-chart-bar"></i> Scrutini</a></li>
                <li><a href="firma.html"><i class="fas fa-clock"></i> Firma Ore</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Esci</a>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Navbar -->
            <nav class="navbar navbar-dark navbar-custom">
                <div class="container-fluid">
                    <span class="navbar-brand">
                        <i class="fas fa-book-open"></i> DidUp - Voti Scritti
                    </span>
                    <div class="nav-user" onclick="logout()" style="cursor: pointer;">
                        <i class="fas fa-user-circle"></i>
                    </div>
                </div>
            </nav>

            <!-- Page Content -->
            <div class="page-content">
                <div class="container-fluid">
                    <h2 class="mb-4">Valutazioni Scritte</h2>

                    <div id="noStudentsAlert" class="alert alert-warning">
                        <i class="fas fa-inbox"></i> Nessun alunno caricato. Vai su <a href="classe.html">Gestione Classe</a> per importare gli alunni.
                    </div>

                    <div id="contentContainer" style="display: none;">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Alunno</th>
                                        <th>Media Voti</th>
                                        <th>N° Voti</th>
                                        <th>Azioni</th>
                                    </tr>
                                </thead>
                                <tbody id="studentsList">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Adding Grade -->
    <div class="modal fade" id="gradeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Voto Scritto - <span id="modalStudentName"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Voto</label>
                        <select class="form-control" id="gradeSelect">
                            <option value="">Seleziona voto</option>
                            <option value="4">4</option>
                            <option value="4.25">4+</option>
                            <option value="4.5">4½</option>
                            <option value="4.75">5-</option>
                            <option value="5">5</option>
                            <option value="5.25">5+</option>
                            <option value="5.5">5½</option>
                            <option value="5.75">6-</option>
                            <option value="6">6</option>
                            <option value="6.25">6+</option>
                            <option value="6.5">6½</option>
                            <option value="6.75">7-</option>
                            <option value="7">7</option>
                            <option value="7.25">7+</option>
                            <option value="7.5">7½</option>
                            <option value="7.75">8-</option>
                            <option value="8">8</option>
                            <option value="8.25">8+</option>
                            <option value="8.5">8½</option>
                            <option value="8.75">9-</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                        </select>
                    </div>

                    <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" id="addToAverage">
                        <label class="form-check-label" for="addToAverage">
                            Aggiungere per Media
                        </label>
                    </div>

                    <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" id="showFamily">
                        <label class="form-check-label" for="showFamily">
                            Mostra alla famiglia
                        </label>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Commento famiglia (max 250)</label>
                        <textarea class="form-control" id="familyComment" maxlength="250" rows="2"></textarea>
                        <small class="text-muted"><span id="familyCharCount">0</span>/250</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Commento personale (max 250)</label>
                        <textarea class="form-control" id="personalComment" maxlength="250" rows="2"></textarea>
                        <small class="text-muted"><span id="personalCharCount">0</span>/250</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Chiudi</button>
                    <button type="button" class="btn btn-primary" onclick="saveGrade()">Salva Voto</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        let allStudents = [];
        let currentStudentId = null;
        let allGrades = {};

        document.addEventListener('DOMContentLoaded', function() {
            auth.onAuthStateChanged(function(user) {
                if (!user) {
                    window.location.href = 'index.html';
                }
                loadStudents();
            });

            document.getElementById('familyComment').addEventListener('input', function() {
                document.getElementById('familyCharCount').textContent = this.value.length;
            });
            document.getElementById('personalComment').addEventListener('input', function() {
                document.getElementById('personalCharCount').textContent = this.value.length;
            });
        });

        function loadStudents() {
            const user = auth.currentUser;
            if (!user) return;

            db.ref('/utenti/' + user.uid + '/alunni').once('value', function(snapshot) {
                const alunni = snapshot.val();
                allStudents = alunni || {};

                if (!alunni || Object.keys(alunni).length === 0) {
                    document.getElementById('noStudentsAlert').style.display = 'block';
                    document.getElementById('contentContainer').style.display = 'none';
                } else {
                    document.getElementById('noStudentsAlert').style.display = 'none';
                    document.getElementById('contentContainer').style.display = 'block';
                    loadGrades();
                }
            });
        }

        function loadGrades() {
            const user = auth.currentUser;
            if (!user) return;

            db.ref('/utenti/' + user.uid + '/votiScritti').once('value', function(snapshot) {
                allGrades = snapshot.val() || {};
                renderStudentsList();
            });
        }

        function renderStudentsList() {
            const studentsList = document.getElementById('studentsList');
            studentsList.innerHTML = '';

            Object.entries(allStudents).forEach(([id, student]) => {
                const grades = allGrades[id] || [];
                const average = grades.length > 0 ? (grades.reduce((a, b) => a + parseFloat(b.voto), 0) / grades.length).toFixed(2) : '-';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${student.nome} ${student.cognome}</td>
                    <td><strong>${average}</strong></td>
                    <td>${grades.length}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="openGradeModal('${id}', '${student.nome} ${student.cognome}')">
                            <i class="fas fa-plus"></i> Aggiungi Voto
                        </button>
                    </td>
                `;
                studentsList.appendChild(tr);
            });
        }

        function openGradeModal(studentId, studentName) {
            currentStudentId = studentId;
            document.getElementById('modalStudentName').textContent = studentName;
            document.getElementById('gradeSelect').value = '';
            document.getElementById('addToAverage').checked = true;
            document.getElementById('showFamily').checked = false;
            document.getElementById('familyComment').value = '';
            document.getElementById('personalComment').value = '';
            document.getElementById('familyCharCount').textContent = '0';
            document.getElementById('personalCharCount').textContent = '0';
            new bootstrap.Modal(document.getElementById('gradeModal')).show();
        }

        function saveGrade() {
            const user = auth.currentUser;
            const voto = document.getElementById('gradeSelect').value;

            if (!user || !currentStudentId || !voto) {
                alert('Seleziona un voto');
                return;
            }

            const grade = {
                voto: voto,
                data: new Date().toISOString(),
                media: document.getElementById('addToAverage').checked,
                mostraFamiglia: document.getElementById('showFamily').checked,
                commentoFamiglia: document.getElementById('familyComment').value,
                commentoPersonale: document.getElementById('personalComment').value
            };

            if (!allGrades[currentStudentId]) {
                allGrades[currentStudentId] = [];
            }

            allGrades[currentStudentId].push(grade);

            db.ref('/utenti/' + user.uid + '/votiScritti/' + currentStudentId).set(allGrades[currentStudentId])
                .then(() => {
                    bootstrap.Modal.getInstance(document.getElementById('gradeModal')).hide();
                    renderStudentsList();
                })
                .catch(error => {
                    alert('Errore: ' + error.message);
                });
        }

        function logout() {
            if (confirm('Sei sicuro di voler uscire?')) {
                auth.signOut().then(() => {
                    window.location.href = 'index.html';
                });
            }
        }
    </script>
</body>
</html>
