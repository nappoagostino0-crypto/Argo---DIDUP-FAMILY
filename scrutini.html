<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argo DidUp - Scrutini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h5><i class="fas fa-book-open"></i> DidUp</h5>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="classe.html"><i class="fas fa-users"></i> Gestione Classe</a></li>
                <li><a href="registro.html"><i class="fas fa-book"></i> Appello</a></li>
                <li><a href="orali.html"><i class="fas fa-microphone"></i> Voti Orali</a></li>
                <li><a href="scritti.html"><i class="fas fa-pen"></i> Voti Scritti</a></li>
                <li><a href="note.html"><i class="fas fa-sticky-note"></i> Note</a></li>
                <li><a href="scrutini.html" class="active"><i class="fas fa-chart-bar"></i> Scrutini</a></li>
                <li><a href="firma.html"><i class="fas fa-clock"></i> Firma Ore</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Esci</a>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Navbar -->
            <nav class="navbar navbar-dark navbar-custom">
                <div class="container-fluid">
                    <span class="navbar-brand">
                        <i class="fas fa-book-open"></i> DidUp - Scrutini
                    </span>
                    <div class="nav-user" onclick="logout()" style="cursor: pointer;">
                        <i class="fas fa-user-circle"></i>
                    </div>
                </div>
            </nav>

            <!-- Page Content -->
            <div class="page-content">
                <div class="container-fluid">
                    <h2 class="mb-4">Tabellone Voti</h2>

                    <div id="noStudentsAlert" class="alert alert-warning">
                        <i class="fas fa-inbox"></i> Nessun alunno caricato. Vai su <a href="classe.html">Gestione Classe</a> per importare gli alunni.
                    </div>

                    <div id="contentContainer" style="display: none;">
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5 class="mb-0">Filtri</h5>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-3">
                                        <label class="form-label">Tipo Voto</label>
                                        <select class="form-control" id="gradeTypeFilter" onchange="renderTable()">
                                            <option value="tutti">Tutti</option>
                                            <option value="orali">Solo Orali</option>
                                            <option value="scritti">Solo Scritti</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">Ordinamento</label>
                                        <select class="form-control" id="sortFilter" onchange="renderTable()">
                                            <option value="nome">Nome</option>
                                            <option value="media">Media (Ascendente)</option>
                                            <option value="media-desc">Media (Discendente)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover table-sm">
                                <thead>
                                    <tr>
                                        <th>Alunno</th>
                                        <th>Media Orali</th>
                                        <th>Media Scritti</th>
                                        <th>Media Generale</th>
                                        <th>N° Valutazioni</th>
                                    </tr>
                                </thead>
                                <tbody id="studentsList">
                                </tbody>
                            </table>
                        </div>

                        <div class="mt-3">
                            <button class="btn btn-success" onclick="exportPDF()">
                                <i class="fas fa-download"></i> Esporta PDF
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        let allStudents = [];
        let allGradesOrali = {};
        let allGradesScritti = {};

        document.addEventListener('DOMContentLoaded', function() {
            auth.onAuthStateChanged(function(user) {
                if (!user) {
                    window.location.href = 'index.html';
                }
                loadStudents();
            });
        });

        function loadStudents() {
            const user = auth.currentUser;
            if (!user) return;

            db.ref('/utenti/' + user.uid + '/alunni').once('value', function(snapshot) {
                const alunni = snapshot.val();
                allStudents = alunni || {};

                if (!alunni || Object.keys(alunni).length === 0) {
                    document.getElementById('noStudentsAlert').style.display = 'block';
                    document.getElementById('contentContainer').style.display = 'none';
                } else {
                    document.getElementById('noStudentsAlert').style.display = 'none';
                    document.getElementById('contentContainer').style.display = 'block';
                    loadGrades();
                }
            });
        }

        function loadGrades() {
            const user = auth.currentUser;
            if (!user) return;

            db.ref('/utenti/' + user.uid + '/votiOrali').once('value', function(snapshot) {
                allGradesOrali = snapshot.val() || {};
            });

            db.ref('/utenti/' + user.uid + '/votiScritti').once('value', function(snapshot) {
                allGradesScritti = snapshot.val() || {};
                renderTable();
            });
        }

        function calculateAverages(studentId) {
            const gradesOrali = (allGradesOrali[studentId] || []).map(g => parseFloat(g.voto));
            const gradesScritti = (allGradesScritti[studentId] || []).map(g => parseFloat(g.voto));

            const avgOrali = gradesOrali.length > 0 ? (gradesOrali.reduce((a, b) => a + b, 0) / gradesOrali.length).toFixed(2) : '-';
            const avgScritti = gradesScritti.length > 0 ? (gradesScritti.reduce((a, b) => a + b, 0) / gradesScritti.length).toFixed(2) : '-';

            let avgGenerale = '-';
            if (avgOrali !== '-' && avgScritti !== '-') {
                avgGenerale = ((parseFloat(avgOrali) + parseFloat(avgScritti)) / 2).toFixed(2);
            } else if (avgOrali !== '-') {
                avgGenerale = avgOrali;
            } else if (avgScritti !== '-') {
                avgGenerale = avgScritti;
            }

            return {
                avgOrali: avgOrali,
                avgScritti: avgScritti,
                avgGenerale: avgGenerale,
                totalGrades: (allGradesOrali[studentId] || []).length + (allGradesScritti[studentId] || []).length
            };
        }

        function renderTable() {
            const studentsList = document.getElementById('studentsList');
            const typeFilter = document.getElementById('gradeTypeFilter').value;
            const sortFilter = document.getElementById('sortFilter').value;

            const studentsArray = Object.entries(allStudents).map(([id, student]) => {
                const avgs = calculateAverages(id);
                return { id, student, ...avgs };
            });

            // Sort
            if (sortFilter === 'media') {
                studentsArray.sort((a, b) => {
                    const aVal = a.avgGenerale === '-' ? 0 : parseFloat(a.avgGenerale);
                    const bVal = b.avgGenerale === '-' ? 0 : parseFloat(b.avgGenerale);
                    return aVal - bVal;
                });
            } else if (sortFilter === 'media-desc') {
                studentsArray.sort((a, b) => {
                    const aVal = a.avgGenerale === '-' ? 0 : parseFloat(a.avgGenerale);
                    const bVal = b.avgGenerale === '-' ? 0 : parseFloat(b.avgGenerale);
                    return bVal - aVal;
                });
            } else {
                studentsArray.sort((a, b) => a.student.cognome.localeCompare(b.student.cognome));
            }

            studentsList.innerHTML = '';
            studentsArray.forEach(data => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${data.student.nome} ${data.student.cognome}</strong></td>
                    <td>${data.avgOrali}</td>
                    <td>${data.avgScritti}</td>
                    <td><strong>${data.avgGenerale}</strong></td>
                    <td>${data.totalGrades}</td>
                `;
                studentsList.appendChild(tr);
            });
        }

        function exportPDF() {
            alert('Funzione esportazione PDF - Implementare con libreria pdfkit o simile');
        }

        function logout() {
            if (confirm('Sei sicuro di voler uscire?')) {
                auth.signOut().then(() => {
                    window.location.href = 'index.html';
                });
            }
        }
    </script>
</body>
</html>
